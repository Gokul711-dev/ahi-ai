# ═══════════════════════════════════════════════════════════════
# A.H.I. — Artificial Human Intelligence (Jane OS)
# Central Configuration — Production Grade
# ═══════════════════════════════════════════════════════════════

# --- Ollama LLM Settings ---
ollama:
  base_url: "http://localhost:11434"
  models:
    general: "llama3.1:latest"
    code: "qwen2.5-coder:7b"
    embedding: "nomic-embed-text"
  options:
    temperature: 0.6
    top_p: 0.8
    num_ctx: 8192

# --- Memory Settings ---
memory:
  short_term:
    buffer_size: 20
    filepath: "data/short_term.json"
  long_term:
    chromadb_path: "data/chromadb"
    collection_name: "jane_memory"
    max_results: 5
  project_state:
    filepath: "data/project_state.json"

# --- Knowledge / RAG ---
knowledge:
  sources_dir: "knowledge/sources"
  chromadb_path: "data/chromadb"
  collection_name: "jane_knowledge"
  chunk_size: 500
  chunk_overlap: 50
  max_results: 5

# --- Personality ---
personality:
  active_persona: "patrick_jane"
  traits:
    humor: 0.7
    playfulness: 0.6
    curiosity: 0.9
    psychological_insight: 0.9
    confidence: 0.9
  teaching_style: "socratic"

# --- Tools ---
tools:
  code_executor:
    enabled: true
    timeout_seconds: 10
    max_output_chars: 2000
    requires_approval: true
  web_search:
    enabled: true
    max_results: 5
  ip_locator:
    enabled: true
    api_url: "http://ip-api.com/json/"
  file_manager:
    enabled: true
    allowed_directories:
      - "."
      - "knowledge/sources"
    requires_approval_for_write: true
  system_info:
    enabled: true
  cyber_helper:
    enabled: true
    requires_approval: true
    allowed_hosts:
      - "scanme.nmap.org"
      - "localhost"
      - "127.0.0.1"

# --- News RSS Feeds ---
news:
  feeds:
    - name: "Hacker News"
      url: "https://hnrss.org/frontpage"
    - name: "BBC World"
      url: "http://feeds.bbci.co.uk/news/world/rss.xml"
    - name: "BBC Technology"
      url: "http://feeds.bbci.co.uk/news/technology/rss.xml"
    - name: "ArsTechnica"
      url: "https://feeds.arstechnica.com/arstechnica/index"
    - name: "ThreatPost"
      url: "https://threatpost.com/feed/"

# --- Safety ---
safety:
  allowed_base_dirs:
    - "."
  blocked_commands:
    - "rm -rf"
    - "format"
    - "del /s"
  max_code_execution_time: 10
  require_approval_for_network: true

# --- Logging ---
logging:
  level: "INFO"
  file: "data/logs/jane.log"
  max_bytes: 5242880
  backup_count: 3

# --- UI ---
ui:
  default: "cli"
  cli:
    theme: "dark"
    show_tool_calls: true
    show_thinking: false

# --- Voice ---
voice:
  enabled: false                  # set true or pass --voice flag
  tts_enabled: true               # speak Jane's responses aloud
  stt_model: "base"               # tiny | base | small | medium
  listen_duration: 7.0            # recording seconds (if VAD off)
  use_vad: true                   # stop on silence (needs webrtcvad)
  wake_word_enabled: false        # background wake-word listener
  wake_words:
    - "hey jane"
    - "hey jarvis"
